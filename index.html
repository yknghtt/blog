<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>moments in between</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="wrap">
  <header class="site">
    <div class="header-actions">
      <div>
        <h1>moments in between</h1>
        <p class="tagline">фильмы и книги, заметки на полях жизни</p>
      </div>
      <a href="add.html" class="btn primary">+ новая запись</a>
    </div>
    <nav class="tabs" id="tabs">
      <button class="active" data-filter="all">все</button>
      <button data-filter="movie">фильмы</button>
      <button data-filter="book">книги</button>
    </nav>
  </header>

  <main id="feed">
    <!-- записи рендерятся сюда -->
  </main>

  <footer class="site">
    <a href="settings.html">настройки</a>
  </footer>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-card" id="modalCard">
    <!-- содержимое модального окна -->
  </div>
</div>

<script src="store.js"></script>
<script>
  let allEntries = [];
  let currentFilter = "all";

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function initials(title) {
    return (title || "?").trim().slice(0, 1).toUpperCase();
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
  }

  function renderStars(rating) {
    const n = parseInt(rating, 10);
    if (!n) return "";
    return "★".repeat(n) + "☆".repeat(5 - n);
  }

  function typeLabel(type) {
    return type === "movie" ? "фильм" : "книга";
  }

  function render() {
    const feed = document.getElementById("feed");
    const filtered = currentFilter === "all"
      ? allEntries
      : allEntries.filter((e) => e.type === currentFilter);

    if (!Store.isConfigured()) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>сначала подключи хранилище</h2>
          <p>зайди в <a href="settings.html">настройки</a> и укажи свой GitHub-репозиторий — это займёт пару минут, дальше всё будет работать само.</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>здесь пока пусто</h2>
          <p>добавь первую запись — нажми «+ новая запись» наверху.</p>
        </div>`;
      return;
    }

    feed.innerHTML = filtered.map((e) => `
      <article class="entry" data-id="${escapeHtml(e.id)}">
        <div class="entry-cover">
          ${e.cover ? `<img src="${escapeHtml(e.cover)}" alt="" loading="lazy" />` : initials(e.title)}
        </div>
        <div class="entry-body">
          <div class="meta-row">
            <span class="tag ${e.type}">${typeLabel(e.type)}</span>
            <span class="dot-sep">/</span>
            <span class="entry-date">${formatDate(e.date)}</span>
          </div>
          <h2 class="entry-title">${escapeHtml(e.title)}</h2>
          ${e.rating ? `<div class="entry-stars">${renderStars(e.rating)}</div>` : ""}
          <p class="entry-review">${escapeHtml(e.review)}</p>
        </div>
      </article>
    `).join("");
  }

  function openModal(entry) {
    const modalCard = document.getElementById("modalCard");
    const quotesHtml = (entry.quotes || "").trim()
      ? `<div class="modal-quote">${entry.quotes.split("\n").filter(Boolean).map(q => `<p>«${escapeHtml(q)}»</p>`).join("")}</div>`
      : "";

    modalCard.innerHTML = `
      <button class="modal-close" id="modalCloseBtn" aria-label="Закрыть">✕</button>
      <div class="modal-cover">
        ${entry.cover ? `<img src="${escapeHtml(entry.cover)}" alt="" />` : initials(entry.title)}
      </div>
      <div class="modal-meta">
        <span class="tag ${entry.type}">${typeLabel(entry.type)}</span>
        <span class="dot-sep">/</span>
        <span class="entry-date">${formatDate(entry.date)}</span>
      </div>
      <h2 class="modal-title">${escapeHtml(entry.title)}</h2>
      ${entry.rating ? `<div class="modal-stars">${renderStars(entry.rating)}</div>` : ""}
      <p class="modal-review">${escapeHtml(entry.review)}</p>
      ${quotesHtml}
      <div class="modal-actions">
        <button class="btn subtle" id="modalDeleteBtn" data-id="${escapeHtml(entry.id)}">удалить запись</button>
      </div>
    `;
    document.getElementById("modalBackdrop").classList.add("open");
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalDeleteBtn").addEventListener("click", handleDeleteClick);
  }

  let deleteConfirmId = null;

  async function handleDeleteClick(e) {
    const btn = e.target;
    const id = btn.dataset.id;

    if (deleteConfirmId !== id) {
      deleteConfirmId = id;
      btn.textContent = "точно удалить? нажми ещё раз";
      btn.style.color = "#a14b3f";
      btn.style.borderColor = "#a14b3f";
      return;
    }

    btn.disabled = true;
    btn.textContent = "удаляю...";
    try {
      allEntries = await Store.deleteEntry(id);
      closeModal();
      render();
    } catch (err) {
      btn.textContent = "не получилось: " + (err.message || "ошибка");
      btn.disabled = false;
    }
    deleteConfirmId = null;
  }

  function closeModal() {
    document.getElementById("modalBackdrop").classList.remove("open");
    deleteConfirmId = null;
  }

  document.getElementById("modalBackdrop").addEventListener("click", (e) => {
    if (e.target.id === "modalBackdrop") closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });

  document.getElementById("feed").addEventListener("click", (e) => {
    const card = e.target.closest(".entry");
    if (!card) return;
    const id = card.dataset.id;
    const entry = allEntries.find((x) => String(x.id) === String(id));
    if (entry) openModal(entry);
  });

  document.getElementById("tabs").addEventListener("click", (ev) => {
    const btn = ev.target.closest("button");
    if (!btn) return;
    document.querySelectorAll("#tabs button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });

  async function init() {
    if (Store.isConfigured()) {
      allEntries = await Store.fetchEntries();
      allEntries.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    }
    render();
  }

  init();
</script>
</body>
</html>
