<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Полка — фильмы и книги</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="wrap">
  <header class="site">
    <div class="header-actions">
      <div>
        <h1>Полка</h1>
        <p class="tagline">Фильмы и книги, которые останутся со мной</p>
      </div>
      <a href="add.html" class="btn primary">+ Новая запись</a>
    </div>
    <nav class="tabs" id="tabs">
      <button class="active" data-filter="all">Все</button>
      <button data-filter="movie">Фильмы</button>
      <button data-filter="book">Книги</button>
    </nav>
  </header>

  <main id="feed">
    <!-- записи рендерятся сюда -->
  </main>

  <footer class="site">
    <a href="settings.html">настройки</a>
  </footer>
</div>

<script src="store.js"></script>
<script>
  let allEntries = [];
  let currentFilter = "all";

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function initials(title) {
    return (title || "?").trim().slice(0, 1).toUpperCase();
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
  }

  function renderStars(rating) {
    if (!rating) return "";
    const n = parseInt(rating, 10);
    if (!n) return "";
    return "★".repeat(n) + "☆".repeat(5 - n);
  }

  function render() {
    const feed = document.getElementById("feed");
    const filtered = currentFilter === "all"
      ? allEntries
      : allEntries.filter((e) => e.type === currentFilter);

    if (!Store.isConfigured()) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>Сначала подключи хранилище</h2>
          <p>Зайди в <a href="settings.html">настройки</a> и укажи свой GitHub-репозиторий — это займёт пару минут, дальше всё будет работать само.</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>Здесь пока пусто</h2>
          <p>Добавь первую запись — нажми «+ Новая запись» наверху.</p>
        </div>`;
      return;
    }

    feed.innerHTML = filtered.map((e) => `
      <article class="entry">
        <div class="entry-cover">
          ${e.cover ? `<img src="${escapeHtml(e.cover)}" alt="" loading="lazy" />` : initials(e.title)}
        </div>
        <div class="entry-body">
          <div class="meta-row">
            <span class="tag">${e.type === "movie" ? "Фильм" : "Книга"}</span>
            <span class="dot-sep">·</span>
            <span class="entry-date">${formatDate(e.date)}</span>
            ${e.rating ? `<span class="dot-sep">·</span><span class="entry-rating">${renderStars(e.rating)}</span>` : ""}
          </div>
          <h2 class="entry-title">${escapeHtml(e.title)}</h2>
          <p class="entry-review">${escapeHtml(e.review)}</p>
        </div>
      </article>
    `).join("");
  }

  document.getElementById("tabs").addEventListener("click", (ev) => {
    const btn = ev.target.closest("button");
    if (!btn) return;
    document.querySelectorAll("#tabs button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });

  async function init() {
    if (Store.isConfigured()) {
      allEntries = await Store.fetchEntries();
      allEntries.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    }
    render();
  }

  init();
</script>
</body>
</html>
